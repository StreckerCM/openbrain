services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openbrain}
      POSTGRES_USER: ${POSTGRES_USER:-openbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openbrain}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:latest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgresql://${POSTGRES_USER:-openbrain}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-openbrain}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: ${POSTGRES_USER:-openbrain}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:?Set PGRST_JWT_SECRET in .env}
      PGRST_SERVER_PORT: 3000
    ports:
      - "3006:3000"
    networks:
      - default
      - nginxproxymanager_default
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "3008:8080"
    networks:
      - default
      - nginxproxymanager_default
    depends_on:
      db:
        condition: service_healthy

  mcp-gateway:
    build: ./mcp-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-openbrain}
      DB_USER: ${POSTGRES_USER:-openbrain}
      DB_PASS: ${POSTGRES_PASSWORD:?err}
    volumes:
      - ./init.sql:/app/init.sql:ro
    ports:
      - "3007:3001"
    networks:
      - default
      - nginxproxymanager_default
    depends_on:
      db:
        condition: service_healthy

  embedder:
    build: ./embedder
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-openbrain}
      DB_USER: ${POSTGRES_USER:-openbrain}
      DB_PASS: ${POSTGRES_PASSWORD:?err}
      POLL_INTERVAL: "30"
    depends_on:
      db:
        condition: service_healthy

  docs:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./docs:/usr/share/nginx/html:ro
    networks:
      - nginxproxymanager_default

networks:
  nginxproxymanager_default:
    external: true

volumes:
  pgdata:

