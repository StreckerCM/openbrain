<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBrain</title>
    <link rel="stylesheet" href="/css/style.css">
    <script type="importmap">
    {
        "imports": {
            "preact": "/vendor/preact.min.js",
            "preact/hooks": "/vendor/preact-hooks.min.js",
            "@preact/signals": "/vendor/preact-signals.min.js",
            "@preact/signals-core": "/vendor/preact-signals-core.min.js",
            "htm": "/vendor/htm.min.js"
        }
    }
    </script>
</head>
<body>
    <div id="app"></div>
    <script src="/js/config.js"></script>
    <script src="/vendor/sentry.min.js"></script>
    <script>
        if (window.Sentry && window.SENTRY_DSN) {
            Sentry.init({ dsn: window.SENTRY_DSN, environment: 'production' });
            Sentry.setTag('service', 'web-ui');
        }
    </script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
